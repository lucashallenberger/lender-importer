; ----------------------------------------------------------------------------
; Salesforce Autofill - configuration
;
; 1. Copy this file to "config.ini"   (cp config.example.ini config.ini)
; 2. Fill in your own Salesforce login details below.
; 3. NEVER share config.ini - it holds your password. (config.ini is git-ignored.)
; ----------------------------------------------------------------------------

[salesforce]
; Your Salesforce login email.
username = you@example.com

; Your Salesforce password.
password = your-password-here

; Your security token. Salesforce -> Settings -> Reset My Security Token
; (it gets emailed to you). Leave blank if your org doesn't require one.
security_token = your-security-token-here

; "login"  -> normal production org (login.salesforce.com)
; "test"   -> sandbox (test.salesforce.com)
; or a custom My Domain like:  yourcompany.my.salesforce.com
domain = login

[object]
; The Salesforce API name of the object these records go into.
; Leave blank for now - run  discover.py  first to find it, then paste it here.
api_name =
